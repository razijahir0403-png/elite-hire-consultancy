services:
  - type: web
    name: elite-hire-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: elite-hire-uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVE_CLIENT
        value: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1y
      - key: CLIENT_URL
        sync: false
